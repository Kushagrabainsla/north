services:
  north:
    image: ghcr.io/kushagrabainsla/north:latest
    ports:
      - "8000:8000"
    volumes:
      - north_data:/data
      - ${HOME}:${HOME}
    environment:
      - NORTH_HOME=/data
      - NORTH_NORTH_WORKSPACE=${NORTH_NORTH_WORKSPACE:-${PWD}}  # Never default to $HOME — workspace scopes tool access
      - NORTH_SECRET=${NORTH_SECRET:-}
      - NORTH_OPENROUTER_API_KEY=${NORTH_OPENROUTER_API_KEY:-}
      - NORTH_ENV=${NORTH_ENV:-production}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  north_data:
    driver: local
