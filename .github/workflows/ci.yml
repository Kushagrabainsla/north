name: CI

on:
  pull_request:
    branches: ["**"]
  push:
    branches: [main]

jobs:
  lint-and-test:
    name: ruff + pytest
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install --quiet uv

      - name: Install dependencies (including dev extras)
        run: uv pip install --system --no-cache -e . pytest pytest-asyncio ruff

      - name: Lint with ruff
        run: ruff check .

      - name: Run tests
        env:
          # Point north_home at a temp dir so tests don't touch the runner's home.
          NORTH_HOME: /tmp/north-ci
          NORTH_ENV: test
          # A dummy key satisfies the non-empty check without making real calls.
          NORTH_OPENROUTER_API_KEY: ci-dummy-key
        run: python -m pytest -x -q --tb=short -m "not integration"
