name: Publish Docker image

on:
  push:
    branches: [main]
    tags: ["v*"]

# Only one publish at a time per ref; don't cancel tags mid-flight.
concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  # Required for GitHub artifact attestations.
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  build-and-push:
    name: Build & push (${{ github.ref_name }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      # QEMU must come before Buildx to register emulators for cross-platform builds.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/kushagrabainsla/north
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=north
            org.opencontainers.image.description=Personal Life Operating System

      - name: Build and push
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Reuse layer cache across runs via the GitHub Actions cache backend.
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Attest build provenance
        uses: actions/attest@v4
        with:
          subject-name: ghcr.io/kushagrabainsla/north
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
