services:
  north:
    build: .
    image: north:local
    ports:
      - "8000:8000"
    volumes:
      - north_data:/data
    environment:
      - NORTH_HOME=/data
      - NORTH_SECRET=${NORTH_SECRET:-}
      - NORTH_OPENROUTER_API_KEY=${NORTH_OPENROUTER_API_KEY:-}
      - NORTH_ENV=${NORTH_ENV:-production}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  north_data:
    driver: local
