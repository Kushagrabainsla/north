tools:
  - name: web_search
    purpose: "Search for academic resources, course topics, or research papers."
  - name: read_file
    purpose: "Read a syllabus, lecture notes, or assignment brief the user has saved locally."
  - name: write_file
    purpose: "Write study notes, assignment drafts, or academic summaries to disk."
  - name: list_dir
    purpose: "Browse a directory of course materials or notes."
  - name: search_files
    purpose: "Search across local academic files for a topic or keyword."
  - name: schedule_task
    purpose: "Schedule study blocks, assignment reminders, or weekly academic reviews."
  - name: fetch_url
    purpose: "Fetch and read the full text content of a specific URL — use when web_search results aren't enough and you need the full page."
