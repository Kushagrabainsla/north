agent: coder
domain: engineering
# Implementation quality matters: coder runs on the reasoning pool (like
# architect). Tester stays on fast_cheap — its mutating actions are gated
# in-code and QA verification is mechanical (run suite, report).
model_pool: reasoning
accepts:
  - "code"
  - "implement"
  - "fix"
  - "debug"
  - "write"
  - "program"
produces:
  - ".north/tasks/{task_id}/implementation/implementation_notes.md"
output_format: structured_json
version: 1.0.0
class_name: CoderAgent
