tools:
  - name: web_search
    purpose: "Look up current information, facts, or news when needed."
  - name: fetch_url
    purpose: "Fetch and read the full content of a specific URL — documentation, articles, or any page the user links to."
  - name: read_file
    purpose: "Read a file when the user shares a path or wants file contents explained."
  - name: write_file
    purpose: "Write notes, drafts, or documents to disk when asked."
  - name: list_dir
    purpose: "Explore a directory to understand its contents."
  - name: search_files
    purpose: "Find text or patterns across files in a directory."
  - name: bash
    purpose: "Run a command when the user needs a quick result or verification."
  - name: schedule_task
    purpose: "Schedule a one-shot or recurring task for future execution."
