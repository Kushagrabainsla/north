agent: researcher
domain: engineering
model_pool: fast_cheap
accepts:
  - "research"
  - "investigate"
  - "explore"
  - "analyze"
  - "find"
  - "build"
  - "implement"
  - "create"
  - "develop"
produces:
  - "{handoff_dir}/research/context.md"
  - "{handoff_dir}/research/references.json"
output_format: structured_json
version: 1.0.0
class_name: ResearcherAgent
